name: Compile Check

on:
  push:
    branches: [ "**" ]
  pull_request:

jobs:
  build:
    name: Build (iOS Simulator)
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Xcode version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.0'

      - name: Show project info
        run: |
          ls mini-me/
          xcodebuild -project mini-me/mini-me.xcodeproj -list

      - name: Validate asset catalog directly
        run: |
          xcrun actool \
            --output-format human-readable-text \
            --notices --warnings \
            --platform iphonesimulator \
            --minimum-deployment-target 17.0 \
            --compile /tmp/assetout \
            mini-me/mini-me/Assets.xcassets 2>&1 || true

      - name: Build mini-me + widget
        run: |
          xcodebuild \
            -project mini-me/mini-me.xcodeproj \
            -scheme mini-me \
            -destination "generic/platform=iOS Simulator" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            ASSETCATALOG_COMPILER_WARNINGS_AS_ERRORS=NO \
            build 2>&1 | grep -E "error:|warning:|actool|BUILD SUCCEEDED|BUILD FAILED|failed"
